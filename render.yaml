# Render Blueprint — https://render.com/docs/blueprint-spec
# Deployment for AI Tutor Backend
services:
  - type: web
    name: ai-tutor-backend
    runtime: python
    plan: free
    rootDir: .
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app --workers 4 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: GROQ_API_KEY
        sync: false
      - key: SERVE_STATIC
        value: "false"
      - key: CORS_ALLOW_ALL
        value: "true"
      - key: DATABASE_PATH
        value: "conversations.db"
      - key: OUTPUT_DIR
        value: "outputs"
